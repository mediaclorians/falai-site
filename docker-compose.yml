services:
  web:
    build: .
    labels:
      - traefik.enable=true
      - traefik.http.routers.falai.rule=Host(`falaicamiseta.com.br`,`www.falaicamiseta.com.br`)
      - traefik.http.routers.falai.entrypoints=web,websecure
      - traefik.http.routers.falai.tls=true
      - traefik.http.routers.falai.tls.certresolver=mytlschallenge
      - traefik.http.services.falai.loadbalancer.server.port=80
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-falai}
      DB_USER: ${DB_USER:-falai_app}
      DB_PASS: ${DB_PASS}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_TO: ${MAIL_TO:-contato@falaicamiseta.com.br}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Site Falaí}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - ./site:/var/www/html
    networks:
      - internal
      - proxy
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-falai}
      MYSQL_USER: ${DB_USER:-falai_app}
      MYSQL_PASSWORD: ${DB_PASS:?defina DB_PASS no arquivo .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:?defina DB_ROOT_PASS no arquivo .env}
    volumes:
      - db_data:/var/lib/mysql
      - ./site/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASS}"]
      interval: 5s
      timeout: 4s
      retries: 24
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
  proxy:
    external: true
    name: wordpress-6lzg_default

volumes:
  db_data:
