; FALAÍ — ajustes de PHP no container
; mail() do PHP sai pelo msmtp (SMTP autenticado da Hostinger)
sendmail_path = "/usr/bin/msmtp -t"

expose_php = Off
display_errors = Off
log_errors = On

session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"

upload_max_filesize = 2M
post_max_size = 2M
